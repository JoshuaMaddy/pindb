services:
  postgres:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_USER: pindb
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: pindb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pindb"]
      interval: 5s
      timeout: 5s
      retries: 10

  meilisearch:
    image: getmeili/meilisearch:latest
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: ${MEILISEARCH_KEY}
    volumes:
      - meili_data:/meili_data

  app:
    build: .
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      database_connection: postgresql+psycopg://pindb:${POSTGRES_PASSWORD}@postgres/pindb
      meilisearch_url: http://meilisearch:7700
      meilisearch_key: ${MEILISEARCH_KEY}
      image_directory: /app/images
    volumes:
      - images:/app/images
    depends_on:
      postgres:
        condition: service_healthy
      meilisearch:
        condition: service_started

volumes:
  postgres_data:
  meili_data:
  images:
